<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260" role="img" aria-label="Three by two grid path from Jack to Jill avoiding one dangerous intersection">
  <rect width="360" height="260" fill="white"/>
  <g stroke="#111" stroke-width="2">
    <path d="M50 200 H290 M50 140 H290 M50 80 H290"/>
    <path d="M50 80 V200 M130 80 V200 M210 80 V200 M290 80 V200"/>
  </g>
  <circle cx="50" cy="200" r="6" fill="#111"/><text x="18" y="225" font-family="sans-serif" font-size="17">Jack</text>
  <circle cx="290" cy="80" r="6" fill="#111"/><text x="270" y="65" font-family="sans-serif" font-size="17">Jill</text>
  <g stroke="#d22" stroke-width="3">
    <line x1="122" y1="132" x2="138" y2="148"/><line x1="138" y1="132" x2="122" y2="148"/>
  </g>
  <text x="145" y="145" font-family="sans-serif" font-size="14" fill="#d22">danger</text>
</svg>
