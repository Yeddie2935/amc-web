<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-label="Figure with apex U at top, S left and T right at middle (US equals UT equals 2 with angle TUS equals 60 degrees), and R at the bottom; arcs from S to R and from T to R each curve inward as one-sixth of a circle of radius 2">
  <rect width="520" height="300" fill="white"/>

  <!-- Boundary: U -> S (straight) -> R (concave arc) -> T (concave arc) -> U -->
  <path d="M 260,40 L 200,144 A 120,120 0 0,1 260,248 A 120,120 0 0,1 320,144 Z"
        fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round"/>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="260" cy="40"  r="3"/>
    <circle cx="200" cy="144" r="3"/>
    <circle cx="260" cy="248" r="3"/>
    <circle cx="320" cy="144" r="3"/>
  </g>

  <!-- Vertex labels -->
  <g font-family="Georgia, serif" font-size="22" fill="#111">
    <text x="252" y="32"  text-anchor="end">U</text>
    <text x="188" y="150" text-anchor="end">S</text>
    <text x="332" y="150">T</text>
    <text x="252" y="270" text-anchor="end">R</text>
  </g>
</svg>
