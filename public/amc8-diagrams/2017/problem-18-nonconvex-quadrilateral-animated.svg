<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" role="img" aria-label="Non-convex quadrilateral ABCD with AB equals 12, BC equals 4, CD equals 3, AD equals 13, and a right angle at C">
  <style>
    .line{stroke:#111;stroke-width:3;fill:#f8fafc;stroke-linecap:round;stroke-linejoin:round}
    .right{stroke:#111;stroke-width:2;fill:none}
    .label{font-family:Georgia,serif;font-size:22px;fill:#111}
    .len{font-family:Georgia,serif;font-size:18px;fill:#222}
  </style>
  <rect width="540" height="360" fill="white"/>

  <!-- Quadrilateral ABCD: A bottom-right, B bottom-left, C interior, D top -->
  <polygon points="380,280 80,280 140,200 80,155" class="line"/>

  <!-- Right angle marker at C between CB and CD -->
  <polyline points="132.8,209.6 123.2,202.4 130.4,192.8" class="right"/>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="80"  cy="280" r="3"/>
    <circle cx="380" cy="280" r="3"/>
    <circle cx="140" cy="200" r="3"/>
    <circle cx="80"  cy="155" r="3"/>
  </g>

  <!-- Vertex labels -->
  <text x="390" y="290" class="label">A</text>
  <text x="58"  y="295" class="label" text-anchor="end">B</text>
  <text x="152" y="198" class="label">C</text>
  <text x="58"  y="150" class="label" text-anchor="end">D</text>

  <!-- Side length labels -->
  <text x="230" y="305" class="len" text-anchor="middle">12</text>
  <text x="100" y="245" class="len" text-anchor="end">4</text>
  <text x="100" y="180" class="len" text-anchor="end">3</text>
  <text x="245" y="207" class="len">13</text>
</svg>
