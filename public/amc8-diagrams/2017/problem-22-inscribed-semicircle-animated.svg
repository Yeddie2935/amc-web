<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" role="img" aria-label="Right triangle ABC with AC equals 12, BC equals 5, right angle at C; a semicircle is inscribed with diameter along AC and tangent to hypotenuse AB">
  <style>
    .line{stroke:#111;stroke-width:3;fill:#f8fafc;stroke-linejoin:round;stroke-linecap:round}
    .right{stroke:#111;stroke-width:2;fill:none}
    .arc{stroke:#111;stroke-width:3;fill:none}
    .label{font-family:Georgia,serif;font-size:22px;fill:#111}
    .len{font-family:Georgia,serif;font-size:18px;fill:#222}
  </style>
  <rect width="460" height="320" fill="white"/>

  <!-- Right triangle ABC: A bottom-left, C bottom-right, B above C -->
  <polygon points="40,280 400,280 400,130" class="line"/>

  <!-- Inscribed semicircle: diameter on AC ending at C, tangent to AB, radius 10/3 (scale 30 px/unit) -->
  <path d="M 200,280 A 100,100 0 0,1 400,280" class="arc"/>

  <!-- Right angle marker at C -->
  <polyline points="388,280 388,268 400,268" class="right"/>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="40"  cy="280" r="3"/>
    <circle cx="400" cy="280" r="3"/>
    <circle cx="400" cy="130" r="3"/>
  </g>

  <!-- Vertex labels -->
  <text x="28"  y="290" class="label" text-anchor="end">A</text>
  <text x="410" y="295" class="label">C</text>
  <text x="410" y="125" class="label">B</text>

  <!-- Side length labels -->
  <text x="220" y="305" class="len" text-anchor="middle">12</text>
  <text x="412" y="210" class="len">5</text>
</svg>
