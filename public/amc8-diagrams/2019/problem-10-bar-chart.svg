<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" width="460" height="320" role="img" aria-label="Horizontal bar chart showing number of students at soccer practice each weekday: Monday 20, Tuesday 26, Wednesday 16, Thursday 22, Friday 16">
  <rect width="460" height="320" fill="white"/>

  <!-- Title -->
  <text x="230" y="28" font-family="Georgia, serif" font-size="16" fill="#111" text-anchor="middle">Number of students at soccer practice</text>

  <!-- Axis -->
  <line x1="120" y1="40" x2="120" y2="280" stroke="#111" stroke-width="2"/>
  <line x1="120" y1="280" x2="440" y2="280" stroke="#111" stroke-width="2"/>

  <!-- X-axis labels -->
  <g font-family="Georgia, serif" font-size="14" fill="#111" text-anchor="middle">
    <text x="120" y="298">0</text>
    <text x="175" y="298">4</text>
    <text x="230" y="298">8</text>
    <text x="285" y="298">12</text>
    <text x="340" y="298">16</text>
    <text x="395" y="298">20</text>
    <text x="440" y="298">24</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#ccc" stroke-width="1">
    <line x1="175" y1="40" x2="175" y2="280"/>
    <line x1="230" y1="40" x2="230" y2="280"/>
    <line x1="285" y1="40" x2="285" y2="280"/>
    <line x1="340" y1="40" x2="340" y2="280"/>
    <line x1="395" y1="40" x2="395" y2="280"/>
    <line x1="440" y1="40" x2="440" y2="280"/>
  </g>

  <!-- Day labels -->
  <g font-family="Georgia, serif" font-size="15" fill="#111" text-anchor="end">
    <text x="115" y="72">Monday</text>
    <text x="115" y="120">Tuesday</text>
    <text x="115" y="168">Wednesday</text>
    <text x="115" y="216">Thursday</text>
    <text x="115" y="264">Friday</text>
  </g>

  <!-- Bars (scale: 13.75px per unit) -->
  <g fill="#8ba4c7">
    <rect x="120" y="52" width="275" height="30" rx="2"/>
    <rect x="120" y="100" width="357.5" height="30" rx="2"/>
    <rect x="120" y="148" width="220" height="30" rx="2"/>
    <rect x="120" y="196" width="302.5" height="30" rx="2"/>
    <rect x="120" y="244" width="220" height="30" rx="2"/>
  </g>
</svg>
