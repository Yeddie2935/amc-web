    <circle cx="20" cy="232.5" r="4"/><circle cx="62.5" cy="232.5" r="4"/><circle cx="105" cy="232.5" r="4"/><circle cx="147.5" cy="232.5" r="4"/><circle cx="190" cy="232.5" r="4"/><circle cx="232.5" cy="232.5" r="4"/><circle cx="275" cy="232.5" r="4"/><circle cx="317.5" cy="232.5" r="4"/><circle cx="360" cy="232.5" r="4"/>
