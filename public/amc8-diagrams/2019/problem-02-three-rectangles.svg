<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" width="420" height="300" role="img" aria-label="Rectangle ABCD formed by three identical smaller rectangles; D top-left, C top-right, B bottom-right, A bottom-left; two rectangles stacked on the left, one tall rectangle on the right spanning full height">
  <rect width="420" height="300" fill="white"/>

  <!-- Big rectangle ABCD: 15 units wide × 10 units tall -->
  <!-- Scale: 24px per unit → 360 × 240, offset (30, 20) -->
  <!-- Vertical divider at 2/3 width from left (10 units = 240px from left edge) -->
  <!-- Horizontal divider at half height on the left side (5 units = 120px from top) -->
  <g fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Outer rectangle ABCD -->
    <rect x="30" y="20" width="360" height="240"/>
    <!-- Vertical divider: from top edge down to bottom edge, at 2/3 width -->
    <line x1="270" y1="20" x2="270" y2="260"/>
    <!-- Horizontal divider: from left edge to vertical divider, at half height -->
    <line x1="30" y1="140" x2="270" y2="140"/>
  </g>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="30" cy="260" r="3"/>
    <circle cx="390" cy="260" r="3"/>
    <circle cx="390" cy="20" r="3"/>
    <circle cx="30" cy="20" r="3"/>
  </g>

  <!-- Vertex labels -->
  <g font-family="Georgia, serif" font-size="22" fill="#111">
    <text x="18" y="278" text-anchor="end">A</text>
    <text x="402" y="278">B</text>
    <text x="402" y="18">C</text>
    <text x="18" y="18" text-anchor="end">D</text>
  </g>
</svg>
