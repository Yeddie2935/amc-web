<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 220" width="540" height="220" role="img" aria-label="Three views of a cube with faces colored red R, white W, green G, brown B, aqua A, and purple P">
  <rect width="540" height="220" fill="white"/>

  <!-- Cube 1: top=B, front=R, right=G -->
  <g transform="translate(20,30)">
    <g fill="#f0f0f0" stroke="#111" stroke-width="2" stroke-linejoin="round">
      <polygon points="0,140 100,140 100,50 0,50"/>
      <polygon points="0,50 100,50 140,15 40,15"/>
      <polygon points="100,50 140,15 140,105 100,140"/>
    </g>
    <g font-family="Georgia, serif" font-size="26" fill="#111" font-style="italic" text-anchor="middle">
      <text x="50" y="108">R</text>
      <text x="70" y="40">B</text>
      <text x="125" y="88">G</text>
    </g>
  </g>

  <!-- Cube 2: top=B, front=W, right=R -->
  <g transform="translate(195,30)">
    <g fill="#f0f0f0" stroke="#111" stroke-width="2" stroke-linejoin="round">
      <polygon points="0,140 100,140 100,50 0,50"/>
      <polygon points="0,50 100,50 140,15 40,15"/>
      <polygon points="100,50 140,15 140,105 100,140"/>
    </g>
    <g font-family="Georgia, serif" font-size="26" fill="#111" font-style="italic" text-anchor="middle">
      <text x="50" y="108">W</text>
      <text x="70" y="40">B</text>
      <text x="125" y="88">R</text>
    </g>
  </g>

  <!-- Cube 3: top=R, front=P, right=G -->
  <g transform="translate(370,30)">
    <g fill="#f0f0f0" stroke="#111" stroke-width="2" stroke-linejoin="round">
      <polygon points="0,140 100,140 100,50 0,50"/>
      <polygon points="0,50 100,50 140,15 40,15"/>
      <polygon points="100,50 140,15 140,105 100,140"/>
    </g>
    <g font-family="Georgia, serif" font-size="26" fill="#111" font-style="italic" text-anchor="middle">
      <text x="50" y="108">P</text>
      <text x="70" y="40">R</text>
      <text x="125" y="88">G</text>
    </g>
  </g>
</svg>
