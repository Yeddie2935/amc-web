<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Rhombus ABCD with diagonals AC and BD intersecting at center, perimeter 52 and diagonal AC equals 24">
  <rect width="400" height="320" fill="white"/>

  <g fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Rhombus ABCD -->
    <polygon points="200,20 380,160 200,300 20,160"/>
    <!-- Diagonals -->
    <line x1="20" y1="160" x2="380" y2="160"/>
    <line x1="200" y1="20" x2="200" y2="300"/>
  </g>

  <!-- Right angle marker at center -->
  <polyline points="212,160 212,148 200,148" fill="none" stroke="#111" stroke-width="2"/>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="200" cy="20" r="3"/>
    <circle cx="380" cy="160" r="3"/>
    <circle cx="200" cy="300" r="3"/>
    <circle cx="20" cy="160" r="3"/>
  </g>

  <!-- Vertex labels -->
  <g font-family="Georgia, serif" font-size="22" fill="#111">
    <text x="200" y="15" text-anchor="middle">B</text>
    <text x="392" y="166">C</text>
    <text x="200" y="318" text-anchor="middle">D</text>
    <text x="8" y="166" text-anchor="end">A</text>
  </g>
</svg>
