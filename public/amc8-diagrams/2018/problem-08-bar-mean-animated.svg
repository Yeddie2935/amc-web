<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="problem-08-bar-mean-animated.svg">

<style>
  .label{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#111827}
  .small{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#374151}
  .title{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:700;fill:#111827}
  .line{stroke:#111827;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .thin{stroke:#6b7280;stroke-width:1.5;fill:none}
  .grid{stroke:#d1d5db;stroke-width:1}
  .shade{fill:#93c5fd;fill-opacity:.35;stroke:#2563eb;stroke-width:2}
  .pulse{animation:pulse 1.6s ease-in-out infinite alternate;transform-origin:center}
  .draw{stroke-dasharray:900;stroke-dashoffset:900;animation:draw 2.4s ease forwards}
  .fade{animation:fade 2s ease-in-out infinite alternate}
  .pop{animation:pop 1.5s ease-in-out infinite alternate;transform-origin:center}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{from{opacity:.25}to{opacity:1}}
  @keyframes pulse{from{opacity:.35;stroke-width:2}to{opacity:.95;stroke-width:4}}
  @keyframes pop{from{transform:scale(.96);opacity:.65}to{transform:scale(1.04);opacity:1}}
</style>


<rect width="520" height="360" fill="white"/>
<g transform="translate(40,45)">
  <line x1="30" y1="260" x2="410" y2="260" class="line"/><line x1="30" y1="40" x2="30" y2="260" class="line"/>
  <g class="small"><line x1="28" y1="260" x2="410" y2="260" class="grid"/><text x="5" y="264">0</text><line x1="28" y1="235" x2="410" y2="235" class="grid"/><text x="5" y="239">1</text><line x1="28" y1="210" x2="410" y2="210" class="grid"/><text x="5" y="214">2</text><line x1="28" y1="185" x2="410" y2="185" class="grid"/><text x="5" y="189">3</text><line x1="28" y1="160" x2="410" y2="160" class="grid"/><text x="5" y="164">4</text><line x1="28" y1="135" x2="410" y2="135" class="grid"/><text x="5" y="139">5</text><line x1="28" y1="110" x2="410" y2="110" class="grid"/><text x="5" y="114">6</text><line x1="28" y1="85" x2="410" y2="85" class="grid"/><text x="5" y="89">7</text><line x1="28" y1="60" x2="410" y2="60" class="grid"/><text x="5" y="64">8</text></g>
  <rect x="70" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="25" dur="1s" begin="0.0s" fill="freeze"/><animate attributeName="y" from="260" to="235" dur="1s" begin="0.0s" fill="freeze"/></rect><text x="79" y="282" class="small">1</text><rect x="115" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="75" dur="1s" begin="0.12s" fill="freeze"/><animate attributeName="y" from="260" to="185" dur="1s" begin="0.12s" fill="freeze"/></rect><text x="124" y="282" class="small">2</text><rect x="160" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="50" dur="1s" begin="0.24s" fill="freeze"/><animate attributeName="y" from="260" to="210" dur="1s" begin="0.24s" fill="freeze"/></rect><text x="169" y="282" class="small">3</text><rect x="205" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="150" dur="1s" begin="0.36s" fill="freeze"/><animate attributeName="y" from="260" to="110" dur="1s" begin="0.36s" fill="freeze"/></rect><text x="214" y="282" class="small">4</text><rect x="250" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="200" dur="1s" begin="0.48s" fill="freeze"/><animate attributeName="y" from="260" to="60" dur="1s" begin="0.48s" fill="freeze"/></rect><text x="259" y="282" class="small">5</text><rect x="295" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="75" dur="1s" begin="0.6s" fill="freeze"/><animate attributeName="y" from="260" to="185" dur="1s" begin="0.6s" fill="freeze"/></rect><text x="304" y="282" class="small">6</text><rect x="340" y="260" width="28" height="0" fill="#60a5fa"><animate attributeName="height" from="0" to="50" dur="1s" begin="0.72s" fill="freeze"/><animate attributeName="y" from="260" to="210" dur="1s" begin="0.72s" fill="freeze"/></rect><text x="349" y="282" class="small">7</text>
</g>

</svg>