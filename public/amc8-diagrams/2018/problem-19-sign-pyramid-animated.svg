<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="problem-19-sign-pyramid-animated.svg">

<style>
  .label{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#111827}
  .small{font-family:Inter,Arial,sans-serif;font-size:11px;fill:#374151}
  .title{font-family:Inter,Arial,sans-serif;font-size:16px;font-weight:700;fill:#111827}
  .line{stroke:#111827;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .thin{stroke:#6b7280;stroke-width:1.5;fill:none}
  .grid{stroke:#d1d5db;stroke-width:1}
  .shade{fill:#93c5fd;fill-opacity:.35;stroke:#2563eb;stroke-width:2}
  .pulse{animation:pulse 1.6s ease-in-out infinite alternate;transform-origin:center}
  .draw{stroke-dasharray:900;stroke-dashoffset:900;animation:draw 2.4s ease forwards}
  .fade{animation:fade 2s ease-in-out infinite alternate}
  .pop{animation:pop 1.5s ease-in-out infinite alternate;transform-origin:center}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes fade{from{opacity:.25}to{opacity:1}}
  @keyframes pulse{from{opacity:.35;stroke-width:2}to{opacity:.95;stroke-width:4}}
  @keyframes pop{from{transform:scale(.96);opacity:.65}to{transform:scale(1.04);opacity:1}}
</style>


<rect width="520" height="350" fill="white"/>
<text x="24" y="32" class="title">A sign pyramid depends on parity of minuses</text>
<g transform="translate(70,70)">
  <rect x="150" y="0" width="90" height="45" fill="#dbeafe" stroke="#111827" stroke-width="2" class="pop"/><text x="188" y="30" class="label">+</text>
  <rect x="105" y="45" width="90" height="45" fill="#f3f4f6" stroke="#111827" stroke-width="2"/><rect x="195" y="45" width="90" height="45" fill="#f3f4f6" stroke="#111827" stroke-width="2"/><text x="143" y="75" class="label">+</text><text x="233" y="75" class="label">+</text>
  <rect x="60" y="90" width="90" height="45" fill="#f3f4f6" stroke="#111827" stroke-width="2"/><rect x="150" y="90" width="90" height="45" fill="#f3f4f6" stroke="#111827" stroke-width="2"/><rect x="240" y="90" width="90" height="45" fill="#f3f4f6" stroke="#111827" stroke-width="2"/><text x="98" y="120" class="label">−</text><text x="188" y="120" class="label">−</text><text x="278" y="120" class="label">−</text>
  <g class="pulse"><rect x="15" y="135" width="90" height="45" fill="#fef3c7" stroke="#111827" stroke-width="2"/><rect x="105" y="135" width="90" height="45" fill="#fef3c7" stroke="#111827" stroke-width="2"/><rect x="195" y="135" width="90" height="45" fill="#fef3c7" stroke="#111827" stroke-width="2"/><rect x="285" y="135" width="90" height="45" fill="#fef3c7" stroke="#111827" stroke-width="2"/></g>
  <text x="50" y="165" class="label">+</text><text x="140" y="165" class="label">−</text><text x="230" y="165" class="label">+</text><text x="320" y="165" class="label">−</text>
</g>
<text x="72" y="300" class="label">Exactly half of the 16 bottom rows give a + on top.</text>
<text x="360" y="300" class="title">8 ways</text>

</svg>