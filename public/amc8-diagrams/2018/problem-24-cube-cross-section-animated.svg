<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 360" role="img" aria-label="Cube ABCDEFGH drawn in 3D oblique view with body diagonal CE and shaded cross-section rhombus EJCI; J and I are midpoints of edges FB and HD">
  <rect width="460" height="360" fill="white"/>

  <!-- Shaded rhombus EJCI (cross-section) -->
  <polygon points="272,51 86,170 188,310 374,191" fill="#d1d5db" stroke="none"/>

  <!-- Hidden cube edges (dashed): edges to back-bottom vertex A -->
  <g stroke="#111" stroke-width="1.8" fill="none" stroke-dasharray="5 4">
    <line x1="272" y1="51"  x2="265" y2="219"/>  <!-- E - A -->
    <line x1="265" y1="219" x2="83"  y2="254"/>  <!-- A - B -->
    <line x1="265" y1="219" x2="370" y2="275"/>  <!-- A - D -->
  </g>

  <!-- Visible cube edges (solid) -->
  <g stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="272" y1="51"  x2="90"  y2="86"/>   <!-- E - F -->
    <line x1="272" y1="51"  x2="377" y2="107"/>  <!-- E - H -->
    <line x1="90"  y1="86"  x2="195" y2="142"/>  <!-- F - G -->
    <line x1="195" y1="142" x2="377" y2="107"/>  <!-- G - H -->
    <line x1="90"  y1="86"  x2="83"  y2="254"/>  <!-- F - B (through J) -->
    <line x1="377" y1="107" x2="370" y2="275"/>  <!-- H - D (through I) -->
    <line x1="195" y1="142" x2="188" y2="310"/>  <!-- G - C -->
    <line x1="83"  y1="254" x2="188" y2="310"/>  <!-- B - C -->
    <line x1="188" y1="310" x2="370" y2="275"/>  <!-- C - D -->
  </g>

  <!-- Rhombus outline drawn on top of cube edges -->
  <polygon points="272,51 86,170 188,310 374,191"
           fill="none" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Vertex dots -->
  <g fill="#111">
    <circle cx="272" cy="51"  r="3.5"/>
    <circle cx="90"  cy="86"  r="3.5"/>
    <circle cx="195" cy="142" r="3.5"/>
    <circle cx="377" cy="107" r="3.5"/>
    <circle cx="86"  cy="170" r="3.5"/>
    <circle cx="265" cy="219" r="3.5"/>
    <circle cx="374" cy="191" r="3.5"/>
    <circle cx="83"  cy="254" r="3.5"/>
    <circle cx="370" cy="275" r="3.5"/>
    <circle cx="188" cy="310" r="3.5"/>
  </g>

  <!-- Labels -->
  <g font-family="Georgia, serif" font-size="20" fill="#111">
    <text x="282" y="44">E</text>
    <text x="78"  y="78"  text-anchor="end">F</text>
    <text x="180" y="138" text-anchor="end">G</text>
    <text x="387" y="100">H</text>
    <text x="76"  y="166" text-anchor="end">J</text>
    <text x="252" y="225" text-anchor="end">A</text>
    <text x="384" y="188">I</text>
    <text x="73"  y="250" text-anchor="end">B</text>
    <text x="380" y="272">D</text>
    <text x="178" y="334" text-anchor="end">C</text>
  </g>
</svg>
