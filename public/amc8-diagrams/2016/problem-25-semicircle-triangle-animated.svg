<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 430" role="img" aria-label="Semicircle inscribed in isosceles triangle">
<style>.edge{fill:none;stroke:#111;stroke-width:4;stroke-linejoin:round}.semi{fill:none;stroke:#111;stroke-width:4}.alt{stroke:#2563eb;stroke-width:4;stroke-dasharray:8 7;animation:dash 3s infinite}.radius{stroke:#ef4444;stroke-width:5;stroke-linecap:round;opacity:0;animation:rad 5.5s infinite}.label{font:24px Georgia,serif;fill:#111}.eq{font:21px system-ui,sans-serif;font-weight:700;fill:#1d4ed8;opacity:0;animation:eq 5.5s infinite}@keyframes dash{to{stroke-dashoffset:-30}}@keyframes rad{0%,45%{opacity:0}55%,90%{opacity:1}100%{opacity:0}}@keyframes eq{0%,55%{opacity:0}65%,95%{opacity:1}100%{opacity:0}}</style>
