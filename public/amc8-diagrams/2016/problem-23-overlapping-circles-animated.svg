<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" role="img" aria-label="Two overlapping congruent circles and angle CED">
<style>.circle{fill:none;stroke:#111;stroke-width:3}.line{stroke:#111;stroke-width:3}.tri{fill:#93c5fd;fill-opacity:.15;stroke:#2563eb;stroke-width:3;opacity:0;animation:tri 5.5s infinite}.angle{fill:none;stroke:#ef4444;stroke-width:6;stroke-linecap:round;opacity:0;animation:angle 5.5s infinite}.label{font:24px Georgia,serif;fill:#111}.eq{font:20px system-ui,sans-serif;font-weight:700;fill:#1d4ed8;opacity:0;animation:eq 5.5s infinite}@keyframes tri{0%,20%{opacity:0}30%,55%{opacity:1}80%,100%{opacity:.2}}@keyframes angle{0%,45%{opacity:0}55%,90%{opacity:1}100%{opacity:0}}@keyframes eq{0%,55%{opacity:0}65%,95%{opacity:1}100%{opacity:0}}</style>
