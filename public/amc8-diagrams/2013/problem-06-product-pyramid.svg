<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" role="img" aria-label="Product pyramid with top row 6, 5, blank; middle row 30, blank; bottom 600">
  <rect width="360" height="300" fill="white"/>
  <g fill="none" stroke="black" stroke-width="3">
    <rect x="45" y="30" width="90" height="70"/><rect x="135" y="30" width="90" height="70"/><rect x="225" y="30" width="90" height="70"/>
    <rect x="90" y="100" width="90" height="70"/><rect x="180" y="100" width="90" height="70"/>
    <rect x="135" y="170" width="90" height="70"/>
  </g>
  <g font-family="Georgia,serif" font-size="28" text-anchor="middle" dominant-baseline="middle">
    <text x="90" y="65">6</text><text x="180" y="65">5</text><text x="270" y="65">?</text>
    <text x="135" y="135">30</text><text x="225" y="135">?</text>
    <text x="180" y="205">600</text>
