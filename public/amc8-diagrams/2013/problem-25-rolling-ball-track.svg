<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" role="img" aria-label="Ball rolling along three semicircular arcs from A to B">
  <rect width="620" height="280" fill="white"/>
  <g fill="none" stroke="black" stroke-width="3">
    <path d="M90 90 A100 100 0 0 0 290 90"/>
    <path d="M290 90 A60 60 0 0 1 410 90"/>
    <path d="M410 90 A80 80 0 0 0 570 90"/>
    <line x1="60" y1="90" x2="590" y2="90" stroke-dasharray="7 6" stroke="#777"/>
  </g>
  <circle cx="60" cy="90" r="12" fill="black"/>
  <g font-family="Georgia,serif" font-size="22">
    <text x="35" y="98">A</text><text x="595" y="98">B</text><text x="160" y="175">R₁=100</text><text x="330" y="35">R₂=60</text><text x="470" y="175">R₃=80</text>
  </g>
</svg>
