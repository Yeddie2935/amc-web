<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 280" width="340" height="280" role="img" aria-label="Cube with top face A B F E and bottom face D C G H, drawn in oblique projection with the back face up and to the right">
  <rect width="340" height="280" fill="white"/>
  <g fill="none" stroke="#111" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top face A-B-F-E -->
    <polygon points="80,100 210,100 260,60 130,60"/>
    <!-- Bottom face D-C-G-H -->
    <polygon points="80,220 210,220 260,180 130,180"/>
    <!-- Vertical edges -->
    <line x1="80"  y1="100" x2="80"  y2="220"/>
    <line x1="210" y1="100" x2="210" y2="220"/>
    <line x1="260" y1="60"  x2="260" y2="180"/>
    <line x1="130" y1="60"  x2="130" y2="180"/>
  </g>
  <g font-family="Georgia, serif" font-size="22" fill="#111">
    <text x="68"  y="106" text-anchor="end">A</text>
    <text x="200" y="118" text-anchor="end">B</text>
    <text x="222" y="240">C</text>
    <text x="68"  y="240" text-anchor="end">D</text>
    <text x="120" y="52"  text-anchor="end">E</text>
    <text x="268" y="56">F</text>
    <text x="270" y="200">G</text>
    <text x="140" y="200">H</text>
  </g>
</svg>
