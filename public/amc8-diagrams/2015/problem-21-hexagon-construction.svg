<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 430" width="410" height="430" role="img" aria-label="Equiangular hexagon ABCDEF with square ABJI of area 18 above edge AB, square FEHG of area 32 attached to edge FE, equilateral triangle JBK on the right, and dashed segment KC">
  <rect width="410" height="430" fill="white"/>

  <g fill="none" stroke="#111" stroke-width="2" stroke-linejoin="round">
    <!-- Equiangular hexagon ABCDEF -->
    <polygon points="189,124 291,124 359,242 308,330 206,330 138,212"/>
    <!-- Square ABJI above edge AB -->
    <polygon points="189,124 291,124 291,22 189,22"/>
    <!-- Square FEHG attached to edge FE -->
    <polygon points="138,212 206,330 89,398 21,280"/>
    <!-- Equilateral triangle JBK on the right side of edge JB -->
    <polygon points="291,22 291,124 379,73"/>
  </g>

  <!-- Dashed segment KC indicating triangle KBC -->
  <line x1="379" y1="73" x2="359" y2="242" stroke="#111" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Area labels inside the squares -->
  <g font-family="Georgia, serif" font-size="20" fill="#111" text-anchor="middle">
    <text x="240" y="80">18</text>
    <text x="114" y="312">32</text>
  </g>

  <!-- Vertex labels -->
  <g font-family="Georgia, serif" font-size="18" fill="#111">
    <text x="180" y="138" text-anchor="end">A</text>
    <text x="299" y="138">B</text>
    <text x="368" y="248">C</text>
    <text x="316" y="346">D</text>
    <text x="200" y="346" text-anchor="end">E</text>
    <text x="128" y="218" text-anchor="end">F</text>
    <text x="180" y="18" text-anchor="end">I</text>
    <text x="299" y="18">J</text>
    <text x="388" y="76">K</text>
    <text x="14" y="284" text-anchor="end">G</text>
    <text x="80" y="416" text-anchor="end">H</text>
  </g>
</svg>
