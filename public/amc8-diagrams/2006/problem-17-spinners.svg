    <text class="num" x="-30" y="-40">1</text><text class="num" x="30" y="-40">3</text><text class="num" x="45" y="5">5</text><text class="num" x="30" y="47">7</text><text class="num" x="-30" y="47">9</text><text class="num" x="-46" y="5">11</text>
