  <g transform="translate(110,115)">
    <text class="label" x="-90" y="-80">P</text><circle class="line" r="72"/>
    <line class="line" x1="0" y1="0" x2="0" y2="-72"/><line class="line" x1="0" y1="0" x2="62" y2="36"/><line class="line" x1="0" y1="0" x2="-62" y2="36"/>
