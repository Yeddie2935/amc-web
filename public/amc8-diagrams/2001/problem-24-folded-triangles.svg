<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 420" role="img" aria-label="Folded triangular grid figure">
  <rect width="100%" height="100%" fill="white"/>
  <g transform="translate(180 25)" stroke="#111827" stroke-width="3" fill="none" stroke-linejoin="round">
    <polygon points="0,0 100,185 0,370 -100,185"/>
    <line x1="-120" y1="185" x2="120" y2="185" stroke="#111827"/>
    <!-- horizontal lattice lines -->
    <line x1="-20" y1="37" x2="20" y2="37"/><line x1="-40" y1="74" x2="40" y2="74"/><line x1="-60" y1="111" x2="60" y2="111"/><line x1="-80" y1="148" x2="80" y2="148"/>
    <line x1="-80" y1="222" x2="80" y2="222"/><line x1="-60" y1="259" x2="60" y2="259"/><line x1="-40" y1="296" x2="40" y2="296"/><line x1="-20" y1="333" x2="20" y2="333"/>
    <!-- diagonal lattice lines, approximated to match the triangular pattern -->
    <line x1="-20" y1="37" x2="80" y2="222"/><line x1="20" y1="37" x2="-80" y2="222"/>
    <line x1="-40" y1="74" x2="60" y2="259"/><line x1="40" y1="74" x2="-60" y2="259"/>
    <line x1="-60" y1="111" x2="40" y2="296"/><line x1="60" y1="111" x2="-40" y2="296"/>
    <line x1="-80" y1="148" x2="20" y2="333"/><line x1="80" y1="148" x2="-20" y2="333"/>
    <line x1="-100" y1="185" x2="0" y2="370"/><line x1="100" y1="185" x2="0" y2="370"/>
    <line x1="-100" y1="185" x2="0" y2="0"/><line x1="100" y1="185" x2="0" y2="0"/>
  </g>
  <text x="180" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#475569">Fold along the centerline and compare matching triangle colors.</text>
</svg>