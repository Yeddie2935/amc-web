<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 250" role="img" aria-label="Folded square paper and cut lines">
  <rect width="100%" height="100%" fill="white"/>
  <g transform="translate(40 25)" font-family="system-ui, sans-serif">
    <rect x="0" y="0" width="160" height="160" fill="#eff6ff" stroke="#111827" stroke-width="3"/>
    <line x1="80" y1="-12" x2="80" y2="172" stroke="#2563eb" stroke-width="3" stroke-dasharray="10 8"/>
    <text x="45" y="190" font-size="15" fill="#1d4ed8">fold in half</text>
    <path d="M 178 80 H 235" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  </g>
  <g transform="translate(270 25)" font-family="system-ui, sans-serif">
    <rect x="0" y="0" width="80" height="160" fill="#f8fafc" stroke="#111827" stroke-width="3"/>
    <line x1="40" y1="-12" x2="40" y2="172" stroke="#ef4444" stroke-width="3" stroke-dasharray="9 7"/>
    <text x="5" y="190" font-size="15" fill="#ef4444">cut parallel to fold</text>
  </g>
  <text x="73" y="230" font-family="system-ui, sans-serif" font-size="16" fill="#475569">Small rectangles: 4 × 1; large rectangle: 4 × 2</text>
</svg>