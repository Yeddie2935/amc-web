<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img"><style>
text{font-family:Inter,Arial,sans-serif;fill:#111827}.label{font-size:18px;font-weight:600}.small{font-size:14px}.tiny{font-size:11px}.shape{fill:#fff;stroke:#111827;stroke-width:2.5}.thin{fill:none;stroke:#111827;stroke-width:2}.dash{fill:none;stroke:#111827;stroke-width:2;stroke-dasharray:6 5}.shade{fill:#d1d5db;stroke:#111827;stroke-width:2}.accent{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.grid{stroke:#9ca3af;stroke-width:1}.choice{font-size:14px;font-weight:600}.muted{fill:#6b7280}.cat{fill:#f59e0b}.mouse{fill:#94a3b8}.red{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
</style>
<text x="20" y="35" class="label">Cookie shapes</text>
<text x="30" y="90" class="small">Art: trapezoid</text><polygon class="shape" points="250,65 380,65 380,135 200,135"/><text x="315" y="58" class="small">3 in</text><text x="390" y="105" class="small">3 in</text><text x="290" y="155" class="small">5 in</text><path d="M365 135 v-14 h14" class="thin"/>
<text x="30" y="205" class="small">Roger: rectangle</text><rect class="shape" x="230" y="175" width="150" height="75"/><text x="300" y="270" class="small">4 in</text><text x="392" y="220" class="small">2 in</text><path d="M235 250 v-12 h12 M365 250 v-12 h12" class="thin"/>
