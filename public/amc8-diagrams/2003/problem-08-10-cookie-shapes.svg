<text x="30" y="410" class="small">Trisha: triangle</text><polygon class="shape" points="250,475 380,475 380,330"/><text x="305" y="495" class="small">3 in</text><text x="390" y="410" class="small">4 in</text><path d="M365 475 v-14 h14" class="thin"/>
</svg>