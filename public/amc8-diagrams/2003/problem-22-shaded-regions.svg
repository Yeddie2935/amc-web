<text x="510" y="35" class="label">C</text><circle class="shade" cx="510" cy="120" r="70"/><rect x="460" y="70" width="100" height="100" fill="#fff" stroke="#111827" stroke-width="2"/><line class="dash" x1="440" y1="190" x2="440" y2="50"/><line class="dash" x1="580" y1="190" x2="580" y2="50"/><text x="510" y="220" text-anchor="middle" class="small">2 cm diameter</text>
