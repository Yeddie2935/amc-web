<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 360" role="img"><style>
text{font-family:Inter,Arial,sans-serif;fill:#111827}.label{font-size:18px;font-weight:600}.small{font-size:14px}.tiny{font-size:11px}.shape{fill:#fff;stroke:#111827;stroke-width:2.5}.thin{fill:none;stroke:#111827;stroke-width:2}.dash{fill:none;stroke:#111827;stroke-width:2;stroke-dasharray:6 5}.shade{fill:#d1d5db;stroke:#111827;stroke-width:2}.accent{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.grid{stroke:#9ca3af;stroke-width:1}.choice{font-size:14px;font-weight:600}.muted{fill:#6b7280}.cat{fill:#f59e0b}.mouse{fill:#94a3b8}.red{fill:#fee2e2;stroke:#dc2626;stroke-width:2}
</style>
<text x="20" y="30" class="label">Cat/mouse cycles</text>
<g transform="translate(25,55)">
<g transform="translate(0,0)"><text x="45" y="-8" class="small">1</text><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="20" y="25" class="cat">🐱</text><text x="50" y="95" class="mouse">🐭</text></g><g transform="translate(118,0)"><text x="45" y="-8" class="small">2</text><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="60" y="25" class="cat">🐱</text><text x="85" y="60" class="mouse">🐭</text></g><g transform="translate(236,0)"><text x="45" y="-8" class="small">3</text><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="60" y="65" class="cat">🐱</text><text x="85" y="15" class="mouse">🐭</text></g><g transform="translate(354,0)"><text x="45" y="-8" class="small">4</text><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="20" y="65" class="cat">🐱</text><text x="45" y="-5" class="mouse">🐭</text></g><g transform="translate(472,0)"><text x="45" y="-8" class="small">5</text><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="20" y="25" class="cat">🐱</text><text x="5" y="-5" class="mouse">🐭</text></g>
</g>
<text x="320" y="180" text-anchor="middle" class="small">Cat repeats every 4 moves; mouse repeats every 8 moves.</text>
<g transform="translate(30,220)">
<g transform="translate(0,0)"><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="60" y="65" class="cat">🐱</text><text x="0" y="65" class="mouse">🐭</text><text x="40" y="105" text-anchor="middle" class="choice">(A)</text></g><g transform="translate(118,0)"><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="60" y="25" class="cat">🐱</text><text x="0" y="65" class="mouse">🐭</text><text x="40" y="105" text-anchor="middle" class="choice">(B)</text></g><g transform="translate(236,0)"><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="60" y="65" class="cat">🐱</text><text x="0" y="20" class="mouse">🐭</text><text x="40" y="105" text-anchor="middle" class="choice">(C)</text></g><g transform="translate(354,0)"><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="20" y="65" class="cat">🐱</text><text x="0" y="0" class="mouse">🐭</text><text x="40" y="105" text-anchor="middle" class="choice">(D)</text></g><g transform="translate(472,0)"><rect class="shape" x="0" y="0" width="80" height="80"/><line class="thin" x1="40" y1="0" x2="40" y2="80"/><line class="thin" x1="0" y1="40" x2="80" y2="40"/><text x="20" y="25" class="cat">🐱</text><text x="50" y="95" class="mouse">🐭</text><text x="40" y="105" text-anchor="middle" class="choice">(E)</text></g>
</g>
</svg>