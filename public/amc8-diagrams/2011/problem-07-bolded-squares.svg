<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360">
  <rect width="100%" height="100%" fill="white"/>
  <text x="30" y="25" font-size="17" font-family="Arial">Bolded area in four congruent squares</text>
  <!-- top left: 1/4 strip -->
  <g transform="translate(65,55)" stroke="black" stroke-width="2" fill="none">
    <rect x="0" y="0" width="120" height="120"/><line x1="30" y1="0" x2="30" y2="120"/><line x1="60" y1="0" x2="60" y2="120"/><line x1="90" y1="0" x2="90" y2="120"/>
    <rect x="0" y="0" width="30" height="120" stroke-width="5"/>
    <text x="45" y="145" font-size="14" stroke="none" fill="black">1/4</text>
  </g>
  <!-- top right: 1/8 triangle -->
  <g transform="translate(330,55)" stroke="black" stroke-width="2" fill="none">
    <rect x="0" y="0" width="120" height="120"/><line x1="60" y1="0" x2="60" y2="120"/><line x1="0" y1="60" x2="120" y2="60"/>
    <path d="M60 0 L120 0 L120 60 Z" stroke-width="5"/>
    <text x="45" y="145" font-size="14" stroke="none" fill="black">1/8</text>
  </g>
  <!-- bottom left: 3/8 region -->
  <g transform="translate(65,205)" stroke="black" stroke-width="2" fill="none">
    <rect x="0" y="0" width="120" height="120"/><line x1="60" y1="0" x2="60" y2="120"/><line x1="0" y1="60" x2="120" y2="60"/>
    <path d="M0 60 L60 0 L60 120 L0 120 Z" stroke-width="5"/>
    <text x="45" y="145" font-size="14" stroke="none" fill="black">3/8</text>
  </g>
  <!-- bottom right: 1/4 square -->
  <g transform="translate(330,205)" stroke="black" stroke-width="2" fill="none">
    <rect x="0" y="0" width="120" height="120"/><line x1="60" y1="0" x2="60" y2="120"/><line x1="0" y1="60" x2="120" y2="60"/>
    <rect x="0" y="60" width="60" height="60" stroke-width="5"/>
    <text x="45" y="145" font-size="14" stroke="none" fill="black">1/4</text>
  </g>
</svg>
