<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320">
  <rect width="100%" height="100%" fill="white"/>
  <text x="40" y="28" font-size="18" font-family="Arial">Original 5×5 pattern</text>
  <text x="285" y="28" font-size="18" font-family="Arial">After adding a black border</text>
  <g transform="translate(60,55)" stroke="black" stroke-width="2">
    <rect x="0" y="0" width="150" height="150" fill="white"/>
    <g fill="white">
      <rect x="0" y="0" width="30" height="30"/><rect x="30" y="0" width="30" height="30"/><rect x="60" y="0" width="30" height="30"/><rect x="90" y="0" width="30" height="30"/><rect x="120" y="0" width="30" height="30"/>
      <rect x="0" y="30" width="30" height="30"/><rect x="30" y="30" width="30" height="30"/><rect x="60" y="30" width="30" height="30"/><rect x="90" y="30" width="30" height="30"/><rect x="120" y="30" width="30" height="30"/>
      <rect x="0" y="60" width="30" height="30"/><rect x="30" y="60" width="30" height="30"/><rect x="60" y="60" width="30" height="30"/><rect x="90" y="60" width="30" height="30"/><rect x="120" y="60" width="30" height="30"/>
      <rect x="0" y="90" width="30" height="30"/><rect x="30" y="90" width="30" height="30"/><rect x="60" y="90" width="30" height="30"/><rect x="90" y="90" width="30" height="30"/><rect x="120" y="90" width="30" height="30"/>
      <rect x="0" y="120" width="30" height="30"/><rect x="30" y="120" width="30" height="30"/><rect x="60" y="120" width="30" height="30"/><rect x="90" y="120" width="30" height="30"/><rect x="120" y="120" width="30" height="30"/>
    </g>
    <g fill="#9ca3af">
      <rect x="30" y="30" width="30" height="30"/><rect x="60" y="30" width="30" height="30"/><rect x="90" y="30" width="30" height="30"/>
      <rect x="30" y="60" width="30" height="30"/><rect x="90" y="60" width="30" height="30"/>
      <rect x="30" y="90" width="30" height="30"/><rect x="60" y="90" width="30" height="30"/><rect x="90" y="90" width="30" height="30"/>
    </g>
    <g fill="none"><path d="M30 0V150M60 0V150M90 0V150M120 0V150M0 30H150M0 60H150M0 90H150M0 120H150"/></g>
  </g>
  <g transform="translate(305,45)" stroke="black" stroke-width="1.8">
    <rect x="0" y="0" width="175" height="175" fill="white"/>
    <g fill="#9ca3af">
      <!-- 7x7 border -->
      <rect x="0" y="0" width="175" height="25"/><rect x="0" y="150" width="175" height="25"/><rect x="0" y="25" width="25" height="125"/><rect x="150" y="25" width="25" height="125"/>
      <!-- original inner black tiles -->
      <rect x="50" y="50" width="25" height="25"/><rect x="75" y="50" width="25" height="25"/><rect x="100" y="50" width="25" height="25"/>
      <rect x="50" y="75" width="25" height="25"/><rect x="100" y="75" width="25" height="25"/>
      <rect x="50" y="100" width="25" height="25"/><rect x="75" y="100" width="25" height="25"/><rect x="100" y="100" width="25" height="25"/>
    </g>
    <g fill="none"><path d="M25 0V175M50 0V175M75 0V175M100 0V175M125 0V175M150 0V175M0 25H175M0 50H175M0 75H175M0 100H175M0 125H175M0 150H175"/></g>
  </g>
  <text x="305" y="250" font-size="16">Black tiles: 8 + 24 = 32</text>
  <text x="305" y="275" font-size="16">White tiles: 17</text>
</svg>
