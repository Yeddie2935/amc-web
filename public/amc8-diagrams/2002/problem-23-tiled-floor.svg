<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 400" role="img" aria-label="Repeating tiled floor pattern, showing a 6 by 6 block with four dark tiles in each 3 by 3 region">
<style>.grid{stroke:#111;stroke-width:2;stroke-dasharray:7 7;fill:none}.dark{fill:#c9c9c9}.txt{font:22px sans-serif;fill:#111}</style>
<g transform="translate(70,40)">
  <rect x="0" y="0" width="360" height="300" fill="white"/>
  <path class="dark" d="M0 90H210L240 60H300V90H360V150H240L210 120H60L30 150H0Z"/>
  <path class="dark" d="M0 240H180L210 210H300V240L330 270L210 300H30L0 270Z"/>
  <path class="dark" d="M90 0L120 30V120L90 150L60 120V30Z"/>
  <path class="dark" d="M300 0L330 30V150L300 180L270 150V30Z"/>
  <path d="M0 0H360V300M0 0V300" stroke="#111" stroke-width="3" fill="none"/>
  <g class="grid">
    <path d="M30 0V300M60 0V300M90 0V300M120 0V300M150 0V300M180 0V300M210 0V300M240 0V300M270 0V300M300 0V300M330 0V300"/>
    <path d="M0 30H360M0 60H360M0 90H360M0 120H360M0 150H360M0 180H360M0 210H360M0 240H360M0 270H360"/>
  </g>
  <rect x="0" y="0" width="180" height="180" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="8 6"/>
  <text x="190" y="178" class="txt">6×6 repeats</text>
</g>
</svg>
