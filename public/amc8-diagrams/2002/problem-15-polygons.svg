<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" role="img" aria-label="Five polygons on dot grids labeled A through E">
<style>.dot{fill:#111}.poly{fill:none;stroke:#111;stroke-width:3}.txt{font:30px serif;fill:#111}.correct{stroke:#3b82f6;stroke-width:4;fill:none;stroke-dasharray:7 5}</style>
<defs><g id="grid"><circle class="dot" cx="0" cy="0" r="4"/><circle class="dot" cx="30" cy="0" r="4"/><circle class="dot" cx="60" cy="0" r="4"/><circle class="dot" cx="90" cy="0" r="4"/><circle class="dot" cx="120" cy="0" r="4"/><circle class="dot" cx="0" cy="30" r="4"/><circle class="dot" cx="30" cy="30" r="4"/><circle class="dot" cx="60" cy="30" r="4"/><circle class="dot" cx="90" cy="30" r="4"/><circle class="dot" cx="120" cy="30" r="4"/><circle class="dot" cx="0" cy="60" r="4"/><circle class="dot" cx="30" cy="60" r="4"/><circle class="dot" cx="60" cy="60" r="4"/><circle class="dot" cx="90" cy="60" r="4"/><circle class="dot" cx="120" cy="60" r="4"/><circle class="dot" cx="0" cy="90" r="4"/><circle class="dot" cx="30" cy="90" r="4"/><circle class="dot" cx="60" cy="90" r="4"/><circle class="dot" cx="90" cy="90" r="4"/><circle class="dot" cx="120" cy="90" r="4"/></g></defs>
<g transform="translate(25,30)"><use href="#grid"/><path class="poly" d="M0 90L30 60H60V30H90V90H120L90 120H30Z"/><text x="60" y="160" text-anchor="middle" class="txt">A</text></g>
<g transform="translate(195,30)"><use href="#grid"/><path class="poly" d="M0 90V60L30 90H75L105 60V90H120V120H0Z"/><text x="60" y="160" text-anchor="middle" class="txt">B</text></g>
<g transform="translate(365,30)"><use href="#grid"/><path class="poly" d="M0 0V90L30 120L90 60L120 30V90L30 150Z"/><text x="60" y="180" text-anchor="middle" class="txt">C</text></g>
<g transform="translate(535,30)"><use href="#grid"/><path class="poly" d="M0 90V60H30V30L60 60L90 30V90L120 120V150L60 120H0Z"/><text x="60" y="180" text-anchor="middle" class="txt">D</text></g>
<g transform="translate(705,20)"><rect x="-12" y="-12" width="150" height="185" rx="10" class="correct"/><use href="#grid"/><path class="poly" d="M0 0H90V60L120 90V120L90 90V150L60 180V90H30V30Z"/><text x="60" y="195" text-anchor="middle" class="txt">E</text></g>
</svg>
