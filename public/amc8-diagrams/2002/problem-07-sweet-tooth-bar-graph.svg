<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 390" role="img" aria-label="Bar graph showing candy preferences A through E with heights 6, 8, 4, 2, and 5">
  <style>.axis{stroke:#111;stroke-width:3}.grid{stroke:#555;stroke-width:1}.bar{fill:#111}.txt{font:22px serif;fill:#111}.title{font:30px serif;fill:#111}</style>
  <text x="260" y="36" text-anchor="middle" class="title">SWEET TOOTH</text>
  <g transform="translate(95,65)">
    <line x1="0" y1="240" x2="340" y2="240" class="axis"/><line x1="0" y1="0" x2="0" y2="240" class="axis"/>
    <g>
      <line x1="0" y1="210" x2="340" y2="210" class="grid"/><line x1="0" y1="180" x2="340" y2="180" class="grid"/><line x1="0" y1="150" x2="340" y2="150" class="grid"/><line x1="0" y1="120" x2="340" y2="120" class="grid"/><line x1="0" y1="90" x2="340" y2="90" class="grid"/><line x1="0" y1="60" x2="340" y2="60" class="grid"/><line x1="0" y1="30" x2="340" y2="30" class="grid"/><line x1="0" y1="0" x2="340" y2="0" class="grid"/>
    </g>
    <rect x="25" y="60" width="45" height="180" class="bar"/><rect x="95" y="0" width="45" height="240" class="bar"/><rect x="165" y="120" width="45" height="120" class="bar"/><rect x="235" y="180" width="45" height="60" class="bar"/><rect x="305" y="90" width="45" height="150" class="bar"/>
    <text x="47" y="275" text-anchor="middle" class="txt">A</text><text x="117" y="275" text-anchor="middle" class="txt">B</text><text x="187" y="275" text-anchor="middle" class="txt">C</text><text x="257" y="275" text-anchor="middle" class="txt">D</text><text x="327" y="275" text-anchor="middle" class="txt">E</text>
    <g class="txt" text-anchor="end"><text x="-12" y="246">0</text><text x="-12" y="216">1</text><text x="-12" y="186">2</text><text x="-12" y="156">3</text><text x="-12" y="126">4</text><text x="-12" y="96">5</text><text x="-12" y="66">6</text><text x="-12" y="36">7</text><text x="-12" y="6">8</text></g>
  </g>
  <text x="265" y="365" text-anchor="middle" class="txt">Kinds of candy</text>
  <text x="30" y="205" transform="rotate(-90 30 205)" text-anchor="middle" class="txt">Number of students</text>
</svg>
