<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" role="img" aria-label="Juan's stamp collection table by country and decade">
  <style>.line{stroke:#111;stroke-width:2}.txt{font:23px serif;fill:#111}.title{font:30px serif;fill:#111}</style>
  <text x="310" y="36" text-anchor="middle" class="title">Number of Stamps by Decade</text>
  <g transform="translate(55,62)">
    <rect x="0" y="0" width="510" height="175" fill="white" stroke="#111" stroke-width="2"/>
    <line x1="170" y1="0" x2="170" y2="175" class="line"/><line x1="255" y1="0" x2="255" y2="175" class="line"/><line x1="340" y1="0" x2="340" y2="175" class="line"/><line x1="425" y1="0" x2="425" y2="175" class="line"/>
    <line x1="0" y1="35" x2="510" y2="35" class="line"/><line x1="0" y1="70" x2="510" y2="70" class="line"/><line x1="0" y1="105" x2="510" y2="105" class="line"/><line x1="0" y1="140" x2="510" y2="140" class="line"/>
    <g class="txt" text-anchor="middle"><text x="85" y="25">Country</text><text x="212" y="25">50s</text><text x="298" y="25">60s</text><text x="382" y="25">70s</text><text x="468" y="25">80s</text>
      <text x="85" y="60">Brazil</text><text x="212" y="60">4</text><text x="298" y="60">7</text><text x="382" y="60">12</text><text x="468" y="60">8</text>
      <text x="85" y="95">France</text><text x="212" y="95">8</text><text x="298" y="95">4</text><text x="382" y="95">12</text><text x="468" y="95">15</text>
      <text x="85" y="130">Peru</text><text x="212" y="130">6</text><text x="298" y="130">4</text><text x="382" y="130">6</text><text x="468" y="130">10</text>
      <text x="85" y="165">Spain</text><text x="212" y="165">3</text><text x="298" y="165">9</text><text x="382" y="165">13</text><text x="468" y="165">9</text>
    </g>
  </g>
  <text x="310" y="275" text-anchor="middle" class="title">Juan's Stamp Collection</text>
</svg>
